# Serves the published Blazor WebAssembly files as static content.
server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path that is not a real file (e.g. /game, /admin/wallets)
    # returns index.html so Blazor's client-side router can handle the route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
